<!-- public/index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Dashboard</title>
  <meta http-equiv="refresh" content="43200"><!-- 12h failsafe reload for a 24/7 kiosk -->
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css?family=Roboto:700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="sky-a" class="sky"></div>
  <div id="sky-b" class="sky"></div>
  <div id="stars" class="stars"></div>

  <div class="slider" id="slider">
    <div class="track" id="track">

      <!-- Slide 1: clock + bus -->
      <section class="slide slide--home">
        <div class="home-clock card">
          <div class="clock">
            <span id="clock-time" class="clock-time">--:--</span>
            <span id="clock-ampm" class="ampm">--</span>
          </div>
          <div id="date" class="date">--</div>
        </div>

        <div class="home-bus card">
          <div id="bus-list" class="bus-list"><!-- arrivals injected here --></div>
          <div id="bus-updated" class="updated"></div>
        </div>
      </section>

      <!-- Slide 2: weather -->
      <section class="slide slide--weather">
        <div id="weather-card" class="weather-card card">
          <div class="wx-hero">
            <img id="w-icon" class="wx-icon" src="" alt="">
            <div class="wx-main">
              <div id="w-temp" class="w-temp">--°</div>
              <div id="w-cond" class="w-cond">Loading…</div>
            </div>
            <div class="wx-side">
              <div id="w-feels" class="w-feels">Feels --°</div>
              <div id="w-daily-avg" class="w-avg">Avg --°</div>
              <div id="w-sun" class="w-sun">Sun --</div>
            </div>
          </div>
          <div id="hourly-strip" class="hourly-strip"><!-- hourly cards injected here --></div>
        </div>
      </section>

    </div>
  </div>

  <div class="dots" id="dots"></div>

<script>
"use strict";
const API = "https://dashboard.lindevin0701.workers.dev";
const TZ  = "America/New_York";
const BUILD = "2026-06-23-5";   // bump this AND public/version.json to force every device to reload

/* tiny helper: only write to the DOM when the value actually changed
   (avoids constant layout/paint churn that leaks memory on a 24/7 kiosk) */
function setText(el, t){ if (el && el.textContent !== t) el.textContent = t; }

function titleCase(s){ return (s || '').toLowerCase().replace(/\b\w/g, c => c.toUpperCase()); }

const hourFmt = new Intl.DateTimeFormat('en-US', { timeZone:'America/New_York', hour:'2-digit', hour12:false });
function localHour(){ const h = parseInt(hourFmt.format(new Date(Date.now() + timeOffset)), 10); return h === 24 ? 0 : h; }

/* ============================================================
   DYNAMIC SKY — page background + accent shift with time of day.
   Cards are dark glass, so text stays readable on every phase.
   ============================================================ */
const SKY = {
  night: {
    bg:'radial-gradient(120% 85% at 82% -12%, #232c63 0%, rgba(35,44,99,0) 55%), linear-gradient(180deg, #070b22 0%, #0a0f2e 55%, #0d1340 100%)',
    accent:'#7cc7ff', soft:'#aab8ff', glow:'rgba(124,199,255,.45)', stars:1
  },
  dawn: {
    bg:'radial-gradient(110% 90% at 16% 118%, #f3a868 0%, rgba(243,168,104,0) 46%), linear-gradient(180deg, #20264f 0%, #5b3f6e 50%, #b5627c 100%)',
    accent:'#ffd6a0', soft:'#ffc1cb', glow:'rgba(255,200,150,.42)', stars:0
  },
  day: {
    bg:'radial-gradient(95% 75% at 84% -8%, #ffe79e 0%, rgba(255,231,158,0) 42%), linear-gradient(180deg, #1d5cab 0%, #2f7fcc 55%, #5aa6e6 100%)',
    accent:'#ffd24a', soft:'#ffffff', glow:'rgba(255,210,74,.42)', stars:0
  },
  golden: {
    bg:'radial-gradient(110% 90% at 86% 118%, #ffb24a 0%, rgba(255,178,74,0) 46%), linear-gradient(180deg, #2a3568 0%, #7d4a5e 45%, #d2683a 100%)',
    accent:'#ffd9a0', soft:'#ffb27a', glow:'rgba(255,180,110,.46)', stars:0
  },
  dusk: {
    bg:'radial-gradient(110% 90% at 80% 120%, #d2562f 0%, rgba(210,86,47,0) 44%), linear-gradient(180deg, #141232 0%, #46255c 48%, #8d3a4e 100%)',
    accent:'#ff9e7a', soft:'#ffc09a', glow:'rgba(255,140,100,.46)', stars:0
  }
};
function phaseForHour(h){
  if (h >= 21 || h < 5) return 'night';
  if (h < 8)  return 'dawn';
  if (h < 17) return 'day';
  if (h < 19) return 'golden';
  return 'dusk';
}
const skyA = document.getElementById('sky-a');
const skyB = document.getElementById('sky-b');
const starsEl = document.getElementById('stars');
let lastPhase = null, skyTop = skyA;     // skyTop = currently visible layer
function applySky(){
  const phase = phaseForHour(localHour());
  if (phase === lastPhase) return;
  const s = SKY[phase];
  const next = (skyTop === skyA) ? skyB : skyA;
  next.style.backgroundImage = s.bg;
  // cross-fade
  next.style.opacity = '1';
  skyTop.style.opacity = '0';
  skyTop = next;
  starsEl.style.opacity = s.stars ? '1' : '0';
  const r = document.documentElement.style;
  r.setProperty('--accent', s.accent);
  r.setProperty('--accent-soft', s.soft);
  r.setProperty('--glow', s.glow);
  lastPhase = phase;
}

/* ============================================================
   WEATHER CONDITION TINT — slide 2 card reflects the weather.
   Maps the Tomorrow.io weatherCode to a tinted glass gradient.
   ============================================================ */
function weatherCategory(code){
  const c = Number(code);
  if (c === 1000 || c === 1100) return 'clear';
  if (c === 1101 || c === 1102 || c === 1001) return 'clouds';
  if (c === 2000 || c === 2100) return 'fog';
  if (c >= 4000 && c < 5000) return 'rain';
  if ((c >= 5000 && c < 6000) || (c >= 7000 && c < 8000)) return 'snow';
  if (c >= 6000 && c < 7000) return 'rain';
  if (c === 8000) return 'storm';
  return 'clear';
}
const WX_TINT = {
  clearDay:  'linear-gradient(155deg, rgba(58,138,220,.50), rgba(10,16,42,.66))',
  clearNight:'linear-gradient(155deg, rgba(64,74,156,.50), rgba(8,12,32,.70))',
  clouds:    'linear-gradient(155deg, rgba(96,114,144,.50), rgba(12,16,34,.70))',
  fog:       'linear-gradient(155deg, rgba(120,128,142,.48), rgba(12,16,32,.70))',
  rain:      'linear-gradient(155deg, rgba(40,96,134,.55), rgba(8,14,32,.72))',
  snow:      'linear-gradient(155deg, rgba(150,182,214,.46), rgba(14,22,44,.70))',
  storm:     'linear-gradient(155deg, rgba(74,62,116,.55), rgba(8,10,26,.76))'
};
const weatherCardEl = document.getElementById('weather-card');
function applyWeatherTint(code){
  let cat = weatherCategory(code);
  if (cat === 'clear') cat = (lastPhase === 'night' || lastPhase === 'dusk') ? 'clearNight' : 'clearDay';
  weatherCardEl.style.background = WX_TINT[cat] || WX_TINT.clearNight;
}

/* ============================================================
   CLOCK — synced to the Worker's /api/time, then ticked locally.
   The Pi clock can drift; we learn the offset from the server
   once every 15 min and keep ticking on-device in between.
   ============================================================ */
const clockTimeEl = document.getElementById('clock-time');
const clockAmpmEl = document.getElementById('clock-ampm');
const dateEl      = document.getElementById('date');

const timeFmt = new Intl.DateTimeFormat('en-US', { timeZone:TZ, hour:'numeric', minute:'2-digit', hour12:true });
const dateFmt = new Intl.DateTimeFormat('en-US', { timeZone:TZ, weekday:'long', month:'short', day:'numeric' });

let timeOffset = 0;          // serverEpoch - clientEpoch
let lastTimeStr = '', lastDateStr = '';

async function syncTime(){
  try{
    const t0 = Date.now();
    const res = await fetch(`${API}/api/time`, { cache:'no-store' });
    if (!res.ok) return;
    const j = await res.json();
    const t1 = Date.now();
    if (typeof j.epoch_ms === 'number'){
      // account for ~half the round-trip so the offset lines up with "now"
      timeOffset = j.epoch_ms + Math.round((t1 - t0) / 2) - t1;
    }
  }catch(_){ /* keep last offset; if never synced we fall back to the device clock */ }
}

function tickClock(){
  const d = new Date(Date.now() + timeOffset);
  let hh = '', mm = '', ap = '';
  for (const p of timeFmt.formatToParts(d)){
    if (p.type === 'hour') hh = p.value;
    else if (p.type === 'minute') mm = p.value;
    else if (p.type === 'dayPeriod') ap = p.value;
  }
  const t = `${hh}:${mm}`;
  if (t !== lastTimeStr){ clockTimeEl.textContent = t; clockAmpmEl.textContent = ap; lastTimeStr = t; }
  const ds = dateFmt.format(d);
  if (ds !== lastDateStr){ dateEl.textContent = ds; lastDateStr = ds; }
}

/* ============================================================
   WEATHER — polled every 5 min, DOM updated only on change
   ============================================================ */
const wIcon = document.getElementById('w-icon');
const wCond = document.getElementById('w-cond');
const wTemp = document.getElementById('w-temp');
const wFeels = document.getElementById('w-feels');
const wAvg = document.getElementById('w-daily-avg');
const wSun = document.getElementById('w-sun');
const hourlyStrip = document.getElementById('hourly-strip');
let lastIcon = '', lastHourlyHTML = '';

async function loadWeather(){
  try{
    const res = await fetch(`${API}/api/weather`, { cache:'no-store' });
    if (!res.ok) return;
    const j = await res.json();
    if (!j) return;

    const cur = j.current || {};
    const icon = cur.icon || '';
    if (icon && icon !== lastIcon){ wIcon.src = icon; lastIcon = icon; }   // only reload img when it changes
    applyWeatherTint(cur.code);                                            // tint the slide to match conditions
    setText(wCond, cur.label || (cur.code ? `Code ${cur.code}` : 'Weather'));
    setText(wTemp, cur.temp != null ? `${Math.round(cur.temp)}°` : '--°');
    setText(wFeels, cur.feels_like != null ? `Feels ${Math.round(cur.feels_like)}°` : 'Feels --°');
    setText(wAvg, j.daily_avg ? `Avg ${j.daily_avg}°` : 'Avg --°');
    const sun = j.sun || {};
    setText(wSun, `${sun.label || 'Sun'} ${sun.time || '--'}`);

    let html = '';
    (j.hourly || []).slice(0, 6).forEach(h => {
      html += `<div class="hour-card">`
            +   `<div class="hour-time">${h.time || '--'}</div>`
            +   `<img class="hour-icon" src="${h.icon || ''}" alt="">`
            +   `<div class="hour-temp">${h.temp != null ? Math.round(h.temp) + '°' : '--'}</div>`
            +   `<div class="hour-rain">🌧 ${h.rain ?? 0}%</div>`
            + `</div>`;
    });
    if (html !== lastHourlyHTML){ hourlyStrip.innerHTML = html; lastHourlyHTML = html; }
  }catch(_){ /* keep last good weather on the screen */ }
}

/* ============================================================
   BUS — polled every 20s (was 5s), DOM updated only on change
   ============================================================ */
const busList = document.getElementById('bus-list');
const busUpdated = document.getElementById('bus-updated');
let lastBusHTML = null;

async function loadBus(){
  try{
    const res = await fetch(`${API}/api/bus`, { cache:'no-store' });
    if (!res.ok) return;
    const j = await res.json();

    let html = '';
    if (j.hidden){
      html = `<div class="bus-empty">🚌 Next service ${j.scheduled_for || ''}</div>`;
      setText(busUpdated, '');
    } else if (!j.buses){
      html = `<div class="bus-empty">Bus data unavailable</div>`;
    } else {
      for (const line of ['Q44-SBS','Q20']){
        const arr = j.buses[line];
        if (arr && arr.length){
          html += `<div class="bus-group-header">${line}</div>`;
          arr.forEach(b => {
            const minutes = b.minutes != null ? b.minutes : '?';
            html += `<div class="bus-item">`
                  +   `<span class="bus-min">${minutes}</span>`
                  +   `<span class="bus-unit">min</span>`
                  +   `<span class="bus-dest">${titleCase((b.dest || '') + (b.extra || ''))}</span>`
                  + `</div>`;
          });
        }
      }
      if (!html) html = `<div class="bus-empty">No buses right now</div>`;
      setText(busUpdated, 'Updated ' + new Date(Date.now() + timeOffset)
        .toLocaleTimeString('en-US', { timeZone:TZ, hour:'numeric', minute:'2-digit' }));
    }
    if (html !== lastBusHTML){ busList.innerHTML = html; lastBusHTML = html; }
  }catch(_){ /* keep last good bus list on the screen */ }
}

/* ============================================================
   SLIDESHOW — 2 slides, swipe / dots / arrow keys / auto-advance
   ============================================================ */
const slider = document.getElementById('slider');
const track  = document.getElementById('track');
const dotsWrap = document.getElementById('dots');
const slides = Array.from(track.children);
const COUNT = slides.length;
const AUTO_MS = 45000;       // dwell per slide — long, so it rarely moves (ambient/TV-friendly)

let index = 0;
let dragging = false, startX = 0, dx = 0;
let autoTimer = null;

const dots = slides.map((_, i) => {
  const b = document.createElement('button');
  b.className = 'dot' + (i === 0 ? ' active' : '');
  b.setAttribute('aria-label', `Go to slide ${i + 1}`);
  b.addEventListener('click', () => { goTo(i); restartAuto(); });
  dotsWrap.appendChild(b);
  return b;
});
// keep taps on the dots from starting a swipe
dotsWrap.addEventListener('pointerdown', e => e.stopPropagation());

function goTo(i){
  index = (i + COUNT) % COUNT;
  track.style.transition = 'transform 1.8s cubic-bezier(.45,0,.2,1)';
  track.style.transform = `translateX(${-index * 100}%)`;
  dots.forEach((d, k) => d.classList.toggle('active', k === index));
}
function startAuto(){ autoTimer = setInterval(() => goTo(index + 1), AUTO_MS); }
function restartAuto(){ clearInterval(autoTimer); startAuto(); }

slider.addEventListener('pointerdown', e => {
  dragging = true; startX = e.clientX; dx = 0;
  track.style.transition = 'none';
  clearInterval(autoTimer);
  slider.setPointerCapture(e.pointerId);
});
slider.addEventListener('pointermove', e => {
  if (!dragging) return;
  dx = e.clientX - startX;
  track.style.transform = `translateX(calc(${-index * 100}% + ${dx}px))`;
});
function endDrag(){
  if (!dragging) return;
  dragging = false;
  const w = slider.clientWidth || 1;
  if (Math.abs(dx) > w * 0.15) goTo(index + (dx < 0 ? 1 : -1));
  else goTo(index);
  restartAuto();
}
slider.addEventListener('pointerup', endDrag);
slider.addEventListener('pointercancel', endDrag);

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight'){ goTo(index + 1); restartAuto(); }
  else if (e.key === 'ArrowLeft'){ goTo(index - 1); restartAuto(); }
});

/* ============================================================
   AUTO-REFRESH — every device reloads itself when a new build ships.
   Bump BUILD (top) and public/version.json together, push, and all
   screens pick it up within the poll interval. No need to touch them.
   ============================================================ */
async function checkVersion(){
  try{
    const res = await fetch(`/version.json?_=${Date.now()}`, { cache:'no-store' });
    if (!res.ok) return;
    const j = await res.json();
    if (j && j.build && j.build !== BUILD) location.reload();
  }catch(_){ /* offline or not deployed yet — try again next tick */ }
}

/* ============================================================
   BOOT
   ============================================================ */
applySky();                                   // paint immediately (device time)
syncTime().then(() => { applySky(); tickClock(); });   // re-apply once synced
setInterval(tickClock, 1000);
setInterval(applySky, 60 * 1000);             // re-check the sky phase each minute
setInterval(syncTime, 15 * 60 * 1000);

loadWeather();
loadBus();
setInterval(loadWeather, 5 * 60 * 1000);
setInterval(loadBus, 20 * 1000);

checkVersion();
setInterval(checkVersion, 3 * 60 * 1000);     // auto-reload when a new build is pushed

startAuto();
</script>
</body>
</html>
